services:
  # Backend API Server
  - type: web
    name: hauna-preschool-api
    runtime: node
    region: oregon
    plan: free
    rootDirectory: .
    buildCommand: npm install && cd server && npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.10.0
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: hauna-preschool-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hauna-preschool-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
